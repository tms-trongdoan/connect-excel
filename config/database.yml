
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: my_hmvc_app_development
  username: vantrong
  password: Admin123@

test:
  <<: *default
  database: my_hmvc_app_test

production:
  primary: &primary_production
    <<: *default
    database: my_hmvc_app_production
    username: my_hmvc_app
    password: <%= ENV["MY_HMVC_APP_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: my_hmvc_app_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: my_hmvc_app_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: my_hmvc_app_production_cable
    migrations_paths: db/cable_migrate
